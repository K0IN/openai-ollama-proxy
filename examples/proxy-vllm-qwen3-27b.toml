# Proxy configuration for vLLM + Qwen3.6 27B (NVFP4)
# Used with: docker-compose.yml

listen_addr = ":11434"
ollama_version = "0.6.4"
model_context_length = 111111

# How long to wait for upstreams to become healthy on startup.
upstream_startup_wait = "30m"

# Interval between retry attempts when upstream returns 503.
upstream_retry_interval = "2s"

[[upstream]]
url = "http://vllm:8000"
api_key = "change-me"

[[upstream.models]]
upstream = "qwen3.6:27b"
local = "qwen3.6:27b"
context_length = 111111
