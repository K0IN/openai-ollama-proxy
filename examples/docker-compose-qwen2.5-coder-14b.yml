services:
  vllm:
    image: docker.io/vllm/vllm-openai:cu130-nightly
    runtime: nvidia
    ipc: host
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ~/.vllm-cache:/root/.cache/huggingface
    environment:
      - VLLM_API_KEY=change-me
      - HF_TOKEN=
      - HUGGING_FACE_HUB_TOKEN=
      - HUGGINGFACE_HUB_TOKEN=
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    command:
      - Qwen/Qwen2.5-Coder-14B-Instruct-GPTQ-Int4
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - change-me
      - --served-model-name
      - Qwen2.5-Coder
      - --quantization
      - gptq_marlin
      - --dtype
      - float16
      - --kv-cache-dtype
      - fp8
      - --max-model-len
      - "32768"
      - --max-num-batched-tokens
      - "8192"
      - --max-num-seqs
      - "1"
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
      - --enable-prefix-caching
    devices:
      - nvidia.com/gpu=all

  proxy:
    image: ghcr.io/k0in/openai-ollama-proxy:latest
    # build: ..
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - LISTEN_ADDR=:11434
      - UPSTREAM_BASE_URL=http://vllm:8000
      - UPSTREAM_API_KEY=change-me
      - UPSTREAM_MODEL=Qwen2.5-Coder
      - MODEL_NAME=qwen2.5-coder:latest
      - MODEL_CONTEXT_LENGTH=32768
      - OLLAMA_VERSION=0.6.4
      - UPSTREAM_STARTUP_WAIT=30m
      - UPSTREAM_RETRY_INTERVAL=2s
      - HTTP_REQUEST_TIMEOUT=30s
      - HTTP_STREAM_TIMEOUT=5m
      - SHUTDOWN_TIMEOUT=30s
      - MAX_REQUEST_BYTES=33554432
      - DEBUG=false
    depends_on:
      - vllm

volumes:
  vllm-cache:
