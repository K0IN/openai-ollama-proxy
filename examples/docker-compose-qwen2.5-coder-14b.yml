services:
  vllm:
    image: docker.io/vllm/vllm-openai:cu130-nightly
    runtime: nvidia
    ipc: host
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ~/.vllm-cache:/root/.cache/huggingface
    environment:
      - VLLM_API_KEY=change-me
      - HF_TOKEN=
      - HUGGING_FACE_HUB_TOKEN=
      - HUGGINGFACE_HUB_TOKEN=
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    command:
      - Qwen/Qwen2.5-Coder-14B-Instruct-GPTQ-Int4
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - change-me
      - --served-model-name
      - Qwen2.5-Coder
      - --quantization
      - gptq_marlin
      - --dtype
      - float16
      - --kv-cache-dtype
      - fp8
      - --max-model-len
      - "32768"
      - --max-num-batched-tokens
      - "8192"
      - --max-num-seqs
      - "1"
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
      - --enable-prefix-caching
    devices:
      - nvidia.com/gpu=all

  proxy:
    image: ghcr.io/k0in/openai-ollama-proxy:latest
    # build: ..
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - CONFIG_FILE=/etc/proxy/config.toml
    volumes:
      - ./proxy-vllm-qwen2.5-coder-14b.toml:/etc/proxy/config.toml:ro
    depends_on:
      - vllm

volumes:
  vllm-cache:
