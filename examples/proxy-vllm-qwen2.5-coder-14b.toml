# Proxy configuration for vLLM + Qwen2.5-Coder 14B (GPTQ Int4)
# Used with: examples/docker-compose-qwen2.5-coder-14b.yml

listen_addr = ":11434"
ollama_version = "0.6.4"
model_context_length = 32768

upstream_startup_wait = "30m"
upstream_retry_interval = "2s"

http_request_timeout = "30s"
http_stream_timeout = "5m"
shutdown_timeout = "30s"
max_request_bytes = 33554432

[[upstream]]
url = "http://vllm:8000"
api_key = "change-me"

[[upstream.models]]
upstream = "Qwen2.5-Coder"
local = "qwen2.5-coder:latest"
context_length = 32768
