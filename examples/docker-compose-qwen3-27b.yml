services:
  vllm:
    image: docker.io/vllm/vllm-openai:cu130-nightly
    runtime: nvidia
    ipc: host
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ~/.vllm-cache:/root/.cache/huggingface
    environment:
      - VLLM_API_KEY=change-me
      - HF_TOKEN=
      - HUGGING_FACE_HUB_TOKEN=
      - HUGGINGFACE_HUB_TOKEN=
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    command:
      - sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP
      - --trust-remote-code
      - --quantization
      - modelopt
      - --kv-cache-dtype
      - fp8
      - --speculative-config
      - '{"method":"qwen3_5_mtp","num_speculative_tokens":3}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - change-me
      - --served-model-name
      - Qwen3.6
      - --language-model-only
      - --max-model-len
      - "65536"
      - --max-num-batched-tokens
      - "8096"
      - --max-num-seqs
      - "1"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
    devices:
      - nvidia.com/gpu=all

  proxy:
    image: ghcr.io/k0in/openai-ollama-proxy:latest
    # build: ..
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - LISTEN_ADDR=:11434
      - UPSTREAM_BASE_URL=http://vllm:8000
      - UPSTREAM_API_KEY=change-me
      - UPSTREAM_MODEL=Qwen3.6
      - MODEL_NAME=qwen3:latest
      - MODEL_CONTEXT_LENGTH=65536
      - OLLAMA_VERSION=0.6.4
      - UPSTREAM_STARTUP_WAIT=30m
      - UPSTREAM_RETRY_INTERVAL=2s
      - HTTP_REQUEST_TIMEOUT=30s
      - HTTP_STREAM_TIMEOUT=5m
      - SHUTDOWN_TIMEOUT=30s
      - MAX_REQUEST_BYTES=33554432
      - DEBUG=false
    depends_on:
      - vllm

volumes:
  vllm-cache:
