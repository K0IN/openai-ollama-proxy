name: CI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25.9"
                  cache: true

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                  version: v2.11.0

    security:
        name: Security Scan
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25.9"
                  cache: true

            - name: Install gosec
              run: go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1

            - name: Run Gosec Security Scanner
              run: |
                  "$(go env GOPATH)/bin/gosec" -fmt text ./...

    govulncheck:
        name: Govulncheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25.9"
                  cache: true

            - name: Install govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@latest

            - name: Run govulncheck
              run: govulncheck ./...

    test:
        name: Unit Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25.9"
                  cache: true

            - name: Run unit tests
              run: go test -v -race -coverprofile=coverage.out ./...

            - name: Upload coverage
              uses: codecov/codecov-action@v4
              with:
                  file: ./coverage.out

    conformance:
        name: Conformance Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25.9"
                  cache-dependency-path: |
                      go.sum
                      tests/conformance/go.sum

            - name: Run conformance tests (OpenAI, Anthropic, Ollama SDKs)
              run: cd tests/conformance && go test -v -count=1 ./...

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [ lint, security, govulncheck, test, conformance ]
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25.9"
                  cache: true

            - name: Build binary
              run: CGO_ENABLED=0 go build -ldflags="-s -w" -o openai-ollama-proxy ./cmd/proxy

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: openai-ollama-proxy
                  path: openai-ollama-proxy
