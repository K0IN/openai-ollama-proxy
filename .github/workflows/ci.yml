name: CI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
                  cache: true

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v6
              with:
                  version: latest

    security:
        name: Security Scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
                  cache: true

            - name: Run Gosec Security Scanner
              uses: securego/gosec@v2
              with:
                  # we let the report trigger content trigger a failure using the GitHub Security features.
                  args: "-no-fail -fmt sarif -out results.sarif ./..."

            - name: Upload SARIF file
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: results.sarif

    govulncheck:
        name: Govulncheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
                  cache: true

            - name: Install govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@latest

            - name: Run govulncheck
              run: govulncheck ./...

    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
                  cache: true

            - name: Run tests
              run: go test -v -race -coverprofile=coverage.out ./...

            - name: Upload coverage
              uses: codecov/codecov-action@v4
              with:
                  file: ./coverage.out

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [ lint, security, govulncheck, test ]
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
                  cache: true

            - name: Build binary
              run: CGO_ENABLED=0 go build -ldflags="-s -w" -o openai-ollama-proxy ./cmd/proxy

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: openai-ollama-proxy
                  path: openai-ollama-proxy
