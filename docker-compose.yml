services:
  # Main configuration for Qwen3.6-27B (NVFP4)
  # For alternative configurations, see examples/ directory.
  # Edit VLLM_API_KEY (and HF_TOKEN if pulling gated models) before running.
  vllm:
    image: docker.io/vllm/vllm-openai:latest
    runtime: nvidia
    ipc: host
    restart: unless-stopped
    ports:
      - "31432:8000"
    volumes:
      - ~/.vllm-cache:/root/.cache/huggingface
      - ~/.vllm-compile-cache:/root/.cache/vllm
    environment:
      - VLLM_API_KEY=change-me
      - HF_TOKEN=
      - HUGGING_FACE_HUB_TOKEN=
      - HUGGINGFACE_HUB_TOKEN=
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    command:
      - sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP
      - --trust-remote-code
      - --quantization
      - modelopt
      - --kv-cache-dtype
      - fp8
      - --speculative-config
      - '{"method":"qwen3_5_mtp","num_speculative_tokens":3}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - change-me
      - --served-model-name
      - Qwen3.6
      - --language-model-only
      - --max-model-len
      - "65536"
      - --max-num-batched-tokens
      - "8096"
      - --max-num-seqs
      - "1"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --gpu-memory-utilization
      - "0.85"
    deploy:
      resources:
        limits:
          memory: 24g
    devices:
      - nvidia.com/gpu=all

  proxy:
    build: .
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - CONFIG_FILE=/proxy.toml
    volumes:
      - ./proxy.toml:/proxy.toml:ro
    depends_on:
      - vllm

volumes:
  vllm-cache:
