services:
  vllm:
    image: docker.io/vllm/vllm-openai:cu130-nightly
    runtime: nvidia
    ipc: host
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ~/.vllm-cache:/root/.cache/huggingface
    environment:
      - VLLM_API_KEY=${VLLM_API_KEY:-localdev}
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - HUGGINGFACE_HUB_TOKEN=${HF_TOKEN:-}
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
    command:
      - cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit

      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - localdev

      - --served-model-name
      - Qwen3.6

      - --enable-expert-parallel
      - --language-model-only

      - --max-model-len
      - "65536"
      - --max-num-batched-tokens
      - "8096" # 16384
      - --max-num-seqs
      - "1"

      - --reasoning-parser
      - qwen3

      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder

      - --speculative-config 
      - '{"method": "mtp", "num_speculative_tokens": 2}'

      - --moe_backend
      - flashinfer_cutlass

    devices:
      - nvidia.com/gpu=all


  proxy:
    build: .
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - LISTEN_ADDR=:11434
      - VLLM_BASE_URL=http://vllm:8000
      - VLLM_API_KEY=${VLLM_API_KEY:-localdev}
      - VLLM_MODEL=${VLLM_MODEL:-Qwen3.6}
      - MODEL_NAME=${MODEL_NAME:-qwen3:latest}
      - MODEL_CONTEXT_LENGTH=${MODEL_CONTEXT_LENGTH:-65536}
      - OLLAMA_VERSION=${OLLAMA_VERSION:-0.6.4}
      - VLLM_STARTUP_WAIT=${VLLM_STARTUP_WAIT:-30m}
      - VLLM_RETRY_INTERVAL=${VLLM_RETRY_INTERVAL:-2s}
      - DEBUG=${DEBUG:-false}
    depends_on:
      - vllm

volumes:
  vllm-cache:
