# Proxy configuration for vLLM + Qwen3.6 27B (NVFP4)
# Used with: docker-compose.yml
#
# Copy this file and docker-compose.yml to your server, edit the api_key,
# and run: docker compose up -d

listen_addr = ":11434"
ollama_version = "0.6.4"
model_context_length = 65536

upstream_startup_wait = "30m"
upstream_retry_interval = "2s"

http_request_timeout = "30s"
http_stream_timeout = "5m"
shutdown_timeout = "30s"
max_request_bytes = 33554432

[[upstream]]
url = "http://vllm:8000"
# Use either api_key or passthrough, not both.
api_key = "change-me"
# passthrough = true   # passes the client's API key as-is to the upstream
# retry_on_429 = true  # retries on 429 (rate limit), 5xx (server error), and 403 (forbidden)

[[upstream.models]]
upstream = "Qwen3.6"
local = "qwen3:latest"
context_length = 65536
# supports_thinking = ["none", "minimal", "low", "medium", "high", "xhigh"]
# supports_vision = true   # uncomment if the model supports image inputs (for Copilot/GitHub Chat compatibility)
