# Proxy configuration file — v2 (TOML)
# =============================================================================
# This file is baked into the Docker image as /proxy.toml.
# For Docker deployments, mount your own config and set:
#   CONFIG_FILE=/proxy.toml
#
# For standalone / local use:
#   export CONFIG_FILE=/path/to/proxy.toml
# =============================================================================

listen_addr = ":11434"
ollama_version = "0.6.4"
model_context_length = 65536

# --- Optional settings -------------------------------------------------------
# proxy_api_key = "sk-your-secret-key"
# debug = true
# log_max_body_bytes = 4096
# stats_store_path = "/var/lib/openai-ollama-proxy/stats.json"
# upstream_startup_wait = "30m"
# upstream_retry_interval = "2s"
# http_request_timeout = "30s"
# http_stream_timeout = "5m"
# shutdown_timeout = "30s"
# max_request_bytes = 33554432

# --- Upstream definitions ----------------------------------------------------
# Each [[upstream]] block defines a backend server that speaks the
# OpenAI-compatible /v1/chat/completions API.
#
# [[upstream.models]] entries map the upstream model name to a local alias.
# The optional `context_length` overrides the global model_context_length.
# The optional `supports_vision` (default: false) advertises image/vision
# support to clients (Copilot, GitHub Chat, etc.) via the /v1/models endpoint.
# The optional `supports_thinking` (default: false) advertises thinking/reasoning
# capability to Ollama clients via /api/show capabilities. Set to true for
# models that support the `think` parameter (Qwen3, DeepSeek-V3/R1, GPT-OSS).
# The optional `thinking_level` (default: "") auto-injects reasoning_effort into
# upstream requests when the client does not explicitly set `think`. Useful for
# creating model aliases that always use a specific reasoning level:
#   "low", "medium", "high".  Example: create gpt-5.4-xhigh by setting
#   `thinking_level = "high"` on a model mapping that points to gpt-5.4.

# Option A: pre-configured api_key for the upstream (used for all requests via this provider)
# [[upstream]]
# url = "http://localhost:8000"
# api_key = "change-me"
# retry_on_429 = true    # retries 429, 5xx, 403 with exponential backoff

# Option B: passthrough — pass the client's API key as-is to the upstream.
# Each upstream can only use api_key or passthrough, not both.
[[upstream]]
url = "http://localhost:8000"
passthrough = true
# retry_on_429 = true    # retries 429, 5xx, 403 with exponential backoff

[[upstream.models]]
upstream = "Qwen3.6"
local = "qwen3:latest"
context_length = 65536
# supports_vision = true     # uncomment for image/vision model support
# supports_thinking = ["low", "medium", "high"] # uncomment if model supports reasoning
